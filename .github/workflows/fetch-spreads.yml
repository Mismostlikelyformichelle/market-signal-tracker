name: Fetch FRED Spreads

on:
  schedule:
    - cron: '0 13 * * *'  # daily at 13:00 UTC (~9am ET)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest spreads
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_spreads.py

      - name: Fetch VIX EOD
        run: python fetch_vix_eod.py

      - name: Fetch VIX term structure
        run: python fetch_vix_term.py

      - name: Fetch DXY
        run: python fetch_dxy.py

      - name: Fetch Gold
        run: python fetch_gold.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit updated database and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spreads.db docs/data.json docs/index.html
          git diff --cached --quiet || git commit -m "Update spreads data $(date -u +%Y-%m-%d)"
          git push
