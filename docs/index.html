<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Signal Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0b0f14;
    --card: #151b23;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --calm: #2ea043;
    --watch: #d29922;
    --alert: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .updated { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .composite {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1.1rem;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .composite-note {
    color: var(--muted);
    font-size: 0.8rem;
    max-width: 480px;
    margin: -16px 0 24px;
    line-height: 1.4;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    cursor: pointer;
  }
  .card h3 { margin: 0 0 6px; font-size: 0.95rem; color: var(--muted); font-weight: 500; }
  .card .value { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .card .thresholds {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 8px;
    display: none;
  }
  .card:hover .thresholds, .card.expanded .thresholds { display: block; }
  .info-hint {
    position: absolute;
    top: 12px;
    right: 14px;
    color: var(--muted);
    font-size: 0.8rem;
    opacity: 0.6;
  }
  .card:hover .info-hint, .card.expanded .info-hint { opacity: 0; }
  .stale-note { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }
  .as-of { color: var(--muted); font-size: 0.78rem; margin: 2px 0 8px; }
  .section-as-of { color: var(--muted); font-size: 0.78rem; font-weight: 400; margin-left: 8px; }
  .status-Calm, .status-Normal { background: rgba(46,160,67,0.15); color: var(--calm); }
  .status-Watch, .status-Elevated { background: rgba(210,153,34,0.15); color: var(--watch); }
  .status-Alert, .status-High { background: rgba(248,81,73,0.15); color: var(--alert); }
  .composite-Calm { background: rgba(46,160,67,0.15); color: var(--calm); border-color: var(--calm); }
  .composite-Mild-Watch { background: rgba(210,153,34,0.15); color: var(--watch); border-color: var(--watch); }
  .composite-Elevated { background: rgba(210,153,34,0.25); color: var(--watch); border-color: var(--watch); }
  .composite-High-Alert { background: rgba(248,81,73,0.2); color: var(--alert); border-color: var(--alert); }
  .charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .chart-card h3 { margin: 0 0 10px; font-size: 0.95rem; color: var(--muted); font-weight: 500; }
  .no-data { color: var(--muted); font-size: 0.85rem; }
  .section-title { font-size: 1rem; font-weight: 600; margin: 28px 0 12px; }
  .calendar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 16px;
    max-width: 600px;
  }
  .calendar-row {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .calendar-row:last-child { border-bottom: none; }
  .calendar-row-main { display: flex; justify-content: space-between; gap: 16px; }
  .calendar-date { color: var(--muted); font-size: 0.85rem; white-space: nowrap; }
  .calendar-name { font-size: 0.9rem; text-align: right; }
  .calendar-headline { margin-top: 6px; font-size: 0.8rem; text-align: right; }
  .calendar-headline a { color: var(--text); text-decoration: none; }
  .calendar-headline a:hover { text-decoration: underline; }
  .calendar-headline .source { color: var(--muted); }
  .headlines-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 16px;
    max-width: 600px;
    max-height: 360px;
    overflow-y: auto;
  }
  .headline-row {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .headline-row:last-child { border-bottom: none; }
  .headline-row a { color: var(--text); text-decoration: none; font-size: 0.9rem; }
  .headline-row a:hover { text-decoration: underline; }
  .headline-meta { color: var(--muted); font-size: 0.75rem; margin-top: 3px; }
</style>
</head>
<body>
  <h1>Market Signal Tracker</h1>
  <div class="updated" id="updated"></div>

  <div class="section-title" id="calendar-title" style="margin-top: 0;"></div>
  <div class="calendar-card" id="calendar-list"></div>

  <div class="section-title">Top Headlines<span class="section-as-of" id="headlines-as-of"></span></div>
  <div class="headlines-card" id="headlines-list"></div>

  <div class="composite" id="composite" style="margin-top: 28px;"></div>

  <div class="grid" id="cards"></div>

  <div class="charts">
    <div class="chart-card"><h3>10Y-2Y Treasury Spread</h3><canvas id="chart-t10y2y" height="180"></canvas></div>
    <div class="chart-card"><h3>ICE BofA High Yield Spread</h3><canvas id="chart-hy" height="180"></canvas></div>
    <div class="chart-card"><h3>VIX (Daily Close)</h3><canvas id="chart-vix" height="180"></canvas></div>
    <div class="chart-card"><h3>VIX Intraday (most recent session)</h3><canvas id="chart-intraday" height="180"></canvas></div>
    <div class="chart-card"><h3>VIX Term Structure (VIX9D / VIX / VIX3M)</h3><canvas id="chart-vixterm" height="180"></canvas></div>
    <div class="chart-card"><h3>US Dollar Index (DXY)</h3><canvas id="chart-dxy" height="180"></canvas></div>
    <div class="chart-card"><h3>Gold (GC=F)</h3><canvas id="chart-gold" height="180"></canvas></div>
  </div>

function formatAsOfDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function formatAsOfDateTime(isoStr) {
  if (!isoStr) return "";
  const d = new Date(isoStr);
  return d.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}

function renderCard(ind, valueText) {
  if (!ind.status) {
    return `<div class="card"><h3>${ind.label}</h3><div class="no-data">No data available</div></div>`;

  return `<div class="card">
    <span class="info-hint">ⓘ</span>
    <h3>${ind.label}</h3>
    <div class="value">${valueText}</div>
    <div class="as-of">As of ${formatAsOfDate(ind.latest_date)}</div>
    <span class="pill status-${ind.status.replace(/ /g, "-")}">${ind.status}</span>

}

cardsEl.addEventListener("click", (e) => {
  const card = e.target.closest(".card");
  if (card) card.classList.toggle("expanded");
});

function renderMomentumCard(ind, formatValue) {
  if (ind.latest_value === null || ind.latest_value === undefined) {
    return `<div class="card"><h3>${ind.label}</h3><div class="no-data">No data available</div></div>`;
  }
  if (!ind.status) {
    return `<div class="card">
      <span class="info-hint">ⓘ</span>
      <h3>${ind.label}</h3>
      <div class="value">${formatValue(ind.latest_value)}</div>
      <div class="as-of">As of ${formatAsOfDate(ind.latest_date)}</div>
      <div class="thresholds">Status pending — needs 20 trading days of history to compute a 20-day move<br>${ind.thresholds}</div>
    </div>`;
  }
  const chg = ind.pct_change_20d !== null ? (ind.pct_change_20d >= 0 ? "+" : "") + ind.pct_change_20d.toFixed(1) + "% (20d)" : "";
  return `<div class="card">
    <span class="info-hint">ⓘ</span>
    <h3>${ind.label}</h3>
    <div class="value">${formatValue(ind.latest_value)}</div>
    <div class="as-of">As of ${formatAsOfDate(ind.latest_date)}</div>
    <span class="pill status-${ind.status}">${ind.status}</span>
    <div class="thresholds">${chg}<br>${ind.thresholds}</div>
  </div>`;
}

    },
  },
};

  const canvas = document.getElementById(canvasId);
  if (!history || history.length === 0) {
    canvas.parentElement.innerHTML += '<div class="no-data">No data available</div>';
    return;
  }
  new Chart(canvas, {
    ...chartDefaults,
    data: {
      labels: history.map(r => r[labelKey]),
      datasets: [{
        data: history.map(r => r[valueKey]),
        borderColor: color,
        backgroundColor: color,
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.15,
      }],
    },
  });
}

function renderMultiLineChart(canvasId, history, labelKey, series) {
  const canvas = document.getElementById(canvasId);
  if (!history || history.length === 0) {
    canvas.parentElement.innerHTML += '<div class="no-data">No data available</div>';
    return;
  }
  new Chart(canvas, {
    type: "line",
    data: {
      labels: history.map(r => r[labelKey]),
      datasets: series.map(s => ({
        label: s.name,
        data: history.map(r => r[s.key]),
        borderColor: s.color,
        backgroundColor: s.color,
        pointRadius: 0,
        borderWidth: 2,
        tension: 0.15,
      })),
    },
    options: {
      responsive: true,
      plugins: { legend: { display: true, labels: { color: "#e6edf3" } } },
      scales: {
        x: { ticks: { color: "#8b949e" }, grid: { color: "#2a313c" } },
        y: { ticks: { color: "#8b949e" }, grid: { color: "#2a313c" } },
      },
    },
  });
}

renderLineChart("chart-t10y2y", DATA.indicators.t10y2y.history, "date", "value", "#58a6ff");
renderLineChart("chart-hy", DATA.indicators.hy.history, "date", "value", "#d2a8ff");
renderLineChart("chart-vix", DATA.indicators.vix.history, "date", "value", "#ffa657");
renderLineChart("chart-intraday", DATA.vix_intraday.series, "timestamp", "value", "#7ee787");
renderMultiLineChart("chart-vixterm", DATA.indicators.vix_term.history, "date", [
  { name: "VIX9D", key: "vix9d", color: "#f85149" },
  { name: "VIX", key: "vix", color: "#ffa657" },
  { name: "VIX3M", key: "vix3m", color: "#7ee787" },
]);
renderLineChart("chart-dxy", DATA.indicators.dxy.history, "date", "value", "#58a6ff");
renderLineChart("chart-gold", DATA.indicators.gold.history, "date", "value", "#e3b341");

const headlinesEl = document.getElementById("headlines-list");
if (!DATA.headlines || DATA.headlines.length === 0) {
  headlinesEl.innerHTML = '<div class="no-data" style="padding: 12px 0;">No headlines yet</div>';
} else {
  headlinesEl.innerHTML = DATA.headlines.map(h => {
    const t = new Date(h.published_at).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    return `<div class="headline-row">
      <a href="${h.link}" target="_blank" rel="noopener">${h.headline}</a>
      <div class="headline-meta">${h.source} · ${t}</div>
    </div>`;
  }).join("");
  document.getElementById("headlines-as-of").textContent = `As of ${formatAsOfDateTime(DATA.headlines[0].published_at)}`;
}

document.getElementById("calendar-title").innerHTML =
  `Economic Calendar (next ${DATA.econ_calendar.days_ahead} days, recent releases included)` +
  (DATA.econ_calendar.last_refreshed ? `<span class="section-as-of">Last refreshed ${formatAsOfDateTime(DATA.econ_calendar.last_refreshed)}</span>` : "");
const calendarEl = document.getElementById("calendar-list");
if (!DATA.econ_calendar.events || DATA.econ_calendar.events.length === 0) {
  calendarEl.innerHTML = '<div class="no-data" style="padding: 12px 0;">No releases scheduled in this window</div>';
} else {
  calendarEl.innerHTML = DATA.econ_calendar.events.map(ev => {
    const d = new Date(ev.date + "T00:00:00");
    const label = d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    let headlineHtml = "";
    if (ev.headline) {
      const sourceHtml = ev.headline.source ? ` <span class="source">(${ev.headline.source})</span>` : "";
      headlineHtml = `<div class="calendar-headline"><a href="${ev.headline.link}" target="_blank" rel="noopener">${ev.headline.text}</a>${sourceHtml}</div>`;
    }
    return `<div class="calendar-row">
      <div class="calendar-row-main"><span class="calendar-date">${label}</span><span class="calendar-name">${ev.name}</span></div>
      ${headlineHtml}
    </div>`;
  }).join("");
}
</script>
</body>
</html>
